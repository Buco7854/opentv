name: Web CI

# Runs only when the server/web client, the shared modules, or the build
# configuration change (tag pushes always run: new refs skip path filters).
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "server/**"
      - "core/**"
      - "data/**"
      - "Dockerfile"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "core/**"
      - "data/**"
      - "Dockerfile"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/web.yml"
  workflow_dispatch:

jobs:
  build:
    name: Test, build & publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared/server tests and build the server
        run: ./gradlew :core:jvmTest :data:compileKotlinJvm :server:test :server:installDist

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The default buildx builder uses the docker driver, which cannot export a
      # GitHub Actions cache. This provisions a docker-container builder that can.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opentv-web
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build (and push) image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse layers across runs (base images, the Android SDK install, npm
          # and ffmpeg) so only changed layers rebuild.
          cache-from: type=gha
          cache-to: type=gha,mode=max
