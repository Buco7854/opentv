name: Release

# Tag a commit `vX.Y.Z` to build a signed App Bundle (for Play) and APK
# (for direct install), and attach them to a GitHub Release.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   KEYSTORE_BASE64     - base64 of your upload keystore (.jks)
#   KEYSTORE_PASSWORD   - keystore password
#   KEY_ALIAS           - key alias
#   KEY_PASSWORD        - key password
# Create the base64 with:  base64 -w0 upload-keystore.jks > keystore.b64

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. See .github/workflows/release.yml header."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest

      - name: Build signed AAB and APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opentv-release
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
