name: Android CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Test & build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # Decode the stable signing keystore from a repo secret when present, so
      # every CI APK is signed identically and installs as an update. Absent
      # (e.g. fork PRs), the build falls back to the default debug key.
      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/stable.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/stable.keystore" >> "$GITHUB_ENV"
            echo "Signing with the stable keystore."
          else
            echo "No SIGNING_KEYSTORE_BASE64 secret; using the default debug key."
          fi

      - name: Build debug APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentv-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/

  release:
    name: Attach APK to release
    # Tag a commit vX.Y.Z to get a GitHub Release with the APK attached.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: opentv-debug-apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: app-debug.apk
          generate_release_notes: true
