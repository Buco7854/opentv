<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" fill="none" font-family="'Segoe UI',Roboto,system-ui,sans-serif">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FA8FF"/>
      <stop offset="1" stop-color="#5BE3B5"/>
    </linearGradient>
    <linearGradient id="poster" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A3760"/>
      <stop offset="1" stop-color="#1A2036"/>
    </linearGradient>
  </defs>

  <!-- ============ Phone 1: Home ============ -->
  <g transform="translate(20,20)">
    <rect width="270" height="580" rx="34" fill="#05070E" stroke="#232B47" stroke-width="2"/>
    <rect x="10" y="10" width="250" height="560" rx="26" fill="#0A0D18"/>
    <text x="30" y="58" font-size="26" font-weight="800" fill="#E9ECF8">OpenTV</text>
    <circle cx="210" cy="50" r="4" fill="#9AA3C0"/><circle cx="224" cy="50" r="4" fill="#9AA3C0"/><circle cx="238" cy="50" r="4" fill="#9AA3C0"/>
    <!-- playlist card 1 -->
    <rect x="24" y="86" width="222" height="92" rx="18" fill="#111526"/>
    <text x="40" y="120" font-size="16" font-weight="700" fill="#E9ECF8">My Provider</text>
    <text x="40" y="142" font-size="12" fill="#9AA3C0">12,480 items · updated today</text>
    <rect x="40" y="152" width="120" height="20" rx="10" fill="#12453A"/>
    <text x="52" y="166" font-size="11" font-weight="600" fill="#5BE3B5">2 / 3 connections</text>
    <!-- playlist card 2 -->
    <rect x="24" y="190" width="222" height="72" rx="18" fill="#111526"/>
    <text x="40" y="222" font-size="16" font-weight="700" fill="#E9ECF8">Sports backup.m3u</text>
    <text x="40" y="244" font-size="12" fill="#9AA3C0">840 items</text>
    <!-- FAB -->
    <circle cx="214" cy="520" r="26" fill="url(#pg)"/>
    <path d="M214,508 v24 M202,520 h24" stroke="#0B1230" stroke-width="3.5" stroke-linecap="round"/>
    <text x="135" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#8FA8FF">Home</text>
  </g>

  <!-- ============ Phone 2: Browse grid ============ -->
  <g transform="translate(315,20)">
    <rect width="270" height="580" rx="34" fill="#05070E" stroke="#232B47" stroke-width="2"/>
    <rect x="10" y="10" width="250" height="560" rx="26" fill="#0A0D18"/>
    <text x="28" y="52" font-size="18" font-weight="700" fill="#E9ECF8">My Provider</text>
    <!-- tabs -->
    <text x="32" y="86" font-size="13" font-weight="700" fill="#8FA8FF">Live</text>
    <text x="92" y="86" font-size="13" font-weight="700" fill="#E9ECF8">Movies</text>
    <text x="170" y="86" font-size="13" font-weight="600" fill="#9AA3C0">Series</text>
    <rect x="28" y="94" width="40" height="3" rx="2" fill="#8FA8FF"/>
    <!-- filter -->
    <rect x="24" y="108" width="222" height="34" rx="16" fill="#111526" stroke="#3A4366"/>
    <circle cx="44" cy="125" r="6" fill="none" stroke="#9AA3C0" stroke-width="2"/>
    <text x="60" y="130" font-size="12" fill="#9AA3C0">Filter this category</text>
    <!-- poster grid -->
    <g>
      <rect x="24" y="154" width="66" height="100" rx="12" fill="url(#poster)"/>
      <rect x="70" y="160" width="16" height="12" rx="3" fill="url(#pg)"/>
      <rect x="24" y="258" width="58" height="9" rx="4" fill="#3A4366"/>
      <rect x="102" y="154" width="66" height="100" rx="12" fill="url(#poster)"/>
      <rect x="102" y="258" width="50" height="9" rx="4" fill="#3A4366"/>
      <rect x="180" y="154" width="66" height="100" rx="12" fill="url(#poster)"/>
      <rect x="180" y="258" width="58" height="9" rx="4" fill="#3A4366"/>
      <rect x="24" y="284" width="66" height="100" rx="12" fill="url(#poster)"/>
      <rect x="24" y="388" width="44" height="9" rx="4" fill="#3A4366"/>
      <rect x="102" y="284" width="66" height="100" rx="12" fill="url(#poster)"/>
      <rect x="102" y="388" width="58" height="9" rx="4" fill="#3A4366"/>
      <rect x="180" y="284" width="66" height="100" rx="12" fill="url(#poster)"/>
      <rect x="180" y="388" width="50" height="9" rx="4" fill="#3A4366"/>
    </g>
    <text x="135" y="430" text-anchor="middle" font-size="13" font-weight="600" fill="#8FA8FF">Poster grid</text>
  </g>

  <!-- ============ Phone 3: Player ============ -->
  <g transform="translate(610,20)">
    <rect width="270" height="580" rx="34" fill="#05070E" stroke="#232B47" stroke-width="2"/>
    <rect x="10" y="10" width="250" height="560" rx="26" fill="#000000"/>
    <!-- video -->
    <rect x="10" y="150" width="250" height="280" fill="#10131F"/>
    <circle cx="135" cy="290" r="34" fill="#000000" opacity="0.4"/>
    <path d="M125,274 L153,290 L125,306 Z" fill="#FFFFFF" opacity="0.92"/>
    <!-- top overlay -->
    <text x="28" y="64" font-size="15" font-weight="700" fill="#FFFFFF">BBC One HD</text>
    <text x="28" y="86" font-size="11" fill="#5BE3B5">Now: The Six O'Clock News (until 18:30)</text>
    <text x="28" y="104" font-size="11" fill="#9AA3C0">Next: Regional News</text>
    <!-- control icons -->
    <g transform="translate(28,120)" fill="none" stroke="#FFFFFF" stroke-width="2">
      <rect x="0" y="0" width="18" height="14" rx="3"/>
      <circle cx="40" cy="7" r="8"/>
      <path d="M70,0 v14 M64,3 l8,4 -8,4" stroke-linecap="round"/>
      <path d="M98,2 h16 M98,7 h16 M98,12 h10"/>
    </g>
    <!-- seek bar -->
    <rect x="28" y="402" width="214" height="4" rx="2" fill="#3A4366"/>
    <rect x="28" y="402" width="120" height="4" rx="2" fill="url(#pg)"/>
    <circle cx="148" cy="404" r="6" fill="#8FA8FF"/>
    <text x="135" y="470" text-anchor="middle" font-size="13" font-weight="600" fill="#8FA8FF">Player + EPG</text>
    <text x="135" y="492" text-anchor="middle" font-size="11" fill="#9AA3C0">double-tap to skip</text>
  </g>
</svg>
