  <text x="300" y="158" font-size="86" font-weight="800" letter-spacing="-2" fill="#E9ECF8">OpenTV</text>
  <text x="304" y="208" font-size="30" font-weight="500" fill="#9AA3C0">A fast, beautiful, privacy-respecting IPTV player for Android</text>
