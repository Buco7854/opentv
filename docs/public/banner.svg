<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" fill="none" font-family="'Segoe UI',Roboto,system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#131A33"/>
      <stop offset="0.55" stop-color="#0C1020"/>
      <stop offset="1" stop-color="#080A14"/>
    </linearGradient>
    <radialGradient id="glow" cx="245" cy="170" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FA8FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8FA8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="29" y1="36" x2="79" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FA8FF"/>
      <stop offset="1" stop-color="#5BE3B5"/>
    </linearGradient>
    <linearGradient id="sheen" x1="54" y1="39" x2="54" y2="51" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="play" x1="48.5" y1="46" x2="64" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FA8FF"/>
      <stop offset="1" stop-color="#5BE3B5"/>
    </linearGradient>
    <clipPath id="iconRound"><rect width="108" height="108" rx="24"/></clipPath>
  </defs>
  <rect width="1200" height="340" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="28" fill="url(#glow)"/>

  <!-- App icon, rendered identically to the launcher icon -->
  <g transform="translate(120,116)">
    <g clip-path="url(#iconRound)">
      <rect width="108" height="108" fill="#0C1020"/>
      <path d="M46,26 L54,36 L62,26" stroke="#5BE3B5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M39,36 h30 a10,10 0 0 1 10,10 v16 a10,10 0 0 1 -10,10 H39 a10,10 0 0 1 -10,-10 V46 a10,10 0 0 1 10,-10 z" fill="url(#card)"/>
      <path d="M40.5,39 h27 a7.5,7.5 0 0 1 7.5,7.5 v15 a7.5,7.5 0 0 1 -7.5,7.5 h-27 a7.5,7.5 0 0 1 -7.5,-7.5 v-15 a7.5,7.5 0 0 1 7.5,-7.5 z" fill="#12182C"/>
      <path d="M40.5,39 h27 a7.5,7.5 0 0 1 7.5,7.5 v4.5 h-42 v-4.5 a7.5,7.5 0 0 1 7.5,-7.5 z" fill="url(#sheen)"/>
      <path d="M48.5,46 L64,54 L48.5,62 Z" fill="url(#play)"/>
    </g>
  </g>

  <text x="300" y="158" font-size="86" font-weight="800" letter-spacing="-2" fill="#E9ECF8">OpenTV</text>
  <text x="304" y="208" font-size="30" font-weight="500" fill="#9AA3C0">A fast, private IPTV player for Android and Android TV</text>
  <g transform="translate(304,236)" font-size="20" font-weight="600">
    <rect x="0" y="0" width="170" height="40" rx="20" fill="#1A2036"/>
    <text x="85" y="26" text-anchor="middle" fill="#8FA8FF">M3U and Xtream</text>
    <rect x="186" y="0" width="120" height="40" rx="20" fill="#1A2036"/>
    <text x="246" y="26" text-anchor="middle" fill="#5BE3B5">Catch-up</text>
    <rect x="318" y="0" width="150" height="40" rx="20" fill="#1A2036"/>
    <text x="393" y="26" text-anchor="middle" fill="#E9ECF8">Android TV</text>
  </g>
</svg>
