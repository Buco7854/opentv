<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" fill="none" font-family="'Segoe UI',Roboto,system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#131A33"/>
      <stop offset="0.55" stop-color="#0C1020"/>
      <stop offset="1" stop-color="#080A14"/>
    </linearGradient>
    <radialGradient id="glow" cx="245" cy="170" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FA8FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8FA8FF" stop-opacity="0"/>
